services:
  - type: web
    name: evara-bns
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: API_BASE_URL
        value: /api
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: INITIAL_ADMIN_FULL_NAME
        value: System Admin
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "200"
      - key: QR_TARGET_URL
        sync: false
      - key: TRUST_PROXY_HOPS
        value: "1"
