services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: evara_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_FULL_NAME: ${INITIAL_ADMIN_FULL_NAME:-System Admin}
      RATE_LIMIT_REDIS_ENABLED: ${RATE_LIMIT_REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-}
      RATE_LIMIT_REDIS_PREFIX: ${RATE_LIMIT_REDIS_PREFIX:-evara:rate-limit:}
      RATE_LIMIT_IPV6_SUBNET: ${RATE_LIMIT_IPV6_SUBNET:-56}
      REQUEST_LOG_FORMAT: ${REQUEST_LOG_FORMAT:-}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: evara_frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: /api
      BACKEND_UPSTREAM: backend:5000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8081"

  redis:
    image: redis:7-alpine
    container_name: evara_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
