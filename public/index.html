<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>%PAGE_TITLE%</title>
  <meta name="description" content="%PAGE_DESCRIPTION%" />
  <meta name="theme-color" content="#1e2329" />
  <link rel="canonical" href="%PAGE_URL%" />
  <meta property="og:site_name" content="EVARA BNS" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="%PAGE_TITLE%" />
  <meta property="og:description" content="%PAGE_DESCRIPTION%" />
  <meta property="og:url" content="%PAGE_URL%" />
  <meta property="og:image" content="%OG_IMAGE_URL%" />
  <meta property="og:image:alt" content="%OG_IMAGE_ALT%" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="%PAGE_TITLE%" />
  <meta name="twitter:description" content="%PAGE_DESCRIPTION%" />
  <meta name="twitter:image" content="%OG_IMAGE_URL%" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/image.png" />
  <link rel="shortcut icon" type="image/png" href="assets/image.png" />
  <link rel="apple-touch-icon" href="assets/image.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-layout">
      <div class="login-story">
        <div class="login-story-head">
          <div class="brand-mark">
            <img src="assets/image.png" alt="EVARA BNS logo" class="brand-logo" />
          </div>
          <button type="button" class="language-toggle login-language-toggle" data-language-toggle>العربية</button>
        </div>
        <h1>
          <span class="hero-line" data-i18n="login.heroLine1">Good morning!</span>
          <span class="hero-line" data-i18n="login.heroLine2">A new day is here</span>
          <span class="hero-line" data-i18n="login.heroLine3">make the most of it</span>
          <span class="hero-line" data-i18n="login.heroLine4">and keep smiling.</span>
        </h1>
      </div>

      <div class="login-card">
        <div class="login-card-header centered">
          <div class="brand-mark login-brand">
            <img src="assets/image.png" alt="EVARA BNS logo" class="brand-logo" />
          </div>
        </div>
        <p id="loginHint" class="login-hint hidden"></p>
        <form id="loginForm" class="stack-form">
          <div class="form-group">
            <label for="loginEmail" data-i18n="login.emailLabel">Email Address</label>
            <input id="loginEmail" type="email" autocomplete="email" placeholder="name@company.com" data-i18n-placeholder="login.emailPlaceholder" required />
          </div>
          <div class="form-group">
            <label for="loginPassword" data-i18n="login.passwordLabel">Password</label>
            <div class="input-with-action">
              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Enter your password" data-i18n-placeholder="login.passwordPlaceholder" required />
              <button id="togglePasswordBtn" type="button" class="ghost-inline" data-i18n="login.showPassword">Show</button>
            </div>
          </div>
          <div id="loginError" class="form-alert error hidden"></div>
          <button id="loginBtn" type="submit" class="btn btn-primary btn-block" data-i18n="login.signIn">Sign In</button>
        </form>
        <span class="login-footer login-contact">
          By/ Islam Amr
        </span>
      </div>
    </div>
  </section>

  <div id="app" class="app-shell hidden">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-branding">
        <div class="brand-mark small">
          <img src="assets/image.png" alt="EVARA BNS logo" class="brand-logo" />
        </div>
      </div>

      <nav id="sidebarNav" class="sidebar-nav">
        <button type="button" class="nav-item active" data-page="dashboard" data-i18n="nav.dashboard">Dashboard</button>
        <button type="button" class="nav-item" data-page="profile" data-i18n="nav.profile">Profile</button>
        <button type="button" class="nav-item" data-page="employees" data-i18n="nav.employees">Employees</button>
        <button type="button" class="nav-item" data-page="attendance" data-i18n="nav.attendance">Attendance</button>
        <button type="button" class="nav-item" data-page="history" data-i18n="nav.history">History</button>
        <button type="button" class="nav-item" data-page="reports" data-i18n="nav.reports">Reports</button>
        <button type="button" class="nav-item" data-page="qr" data-i18n="nav.qr">QR Access</button>
      </nav>

      <div class="sidebar-user">
        <div id="sidebarAvatar" class="avatar-badge">EV</div>
        <div class="sidebar-user-copy">
          <strong id="sidebarName">EVARA User</strong>
          <span id="sidebarRole">Employee</span>
        </div>
        <button id="logoutBtn" type="button" class="ghost-inline danger" data-i18n="nav.logout">Log out</button>
      </div>
    </aside>

    <main class="app-main">
      <header class="topbar">
        <div class="topbar-start">
          <button id="menuToggle" type="button" class="ghost-inline mobile-only" data-i18n="common.menu">Menu</button>
          <div class="topbar-copy">
            <strong id="topbarHeadline">Start your day with focus and calm confidence.</strong>
            <span id="topbarSubline">Small consistent steps create strong results.</span>
          </div>
        </div>
        <div class="topbar-meta">
          <button type="button" class="language-toggle topbar-language-toggle" data-language-toggle>العربية</button>
          <div>
            <strong id="topbarClock">--:--</strong>
            <span id="topbarDate">-- --- ----</span>
          </div>
        </div>
      </header>

      <section id="page-dashboard" class="page-panel active"></section>
      <section id="page-profile" class="page-panel"></section>
      <section id="page-employees" class="page-panel"></section>
      <section id="page-attendance" class="page-panel"></section>
      <section id="page-history" class="page-panel"></section>
      <section id="page-reports" class="page-panel"></section>
      <section id="page-qr" class="page-panel"></section>
    </main>
  </div>

  <div id="modal" class="modal-shell hidden">
    <div id="modalBackdrop" class="modal-backdrop"></div>
    <div id="modalPanel" class="modal-panel"></div>
  </div>

  <div id="toastViewport" class="toast-viewport"></div>

  <script src="vendor/supabase.js"></script>
  <script src="env.js"></script>
  <script type="module" src="js/i18n.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
