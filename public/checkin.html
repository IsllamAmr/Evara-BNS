<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVARA BNS | Check In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/image.png" />
  <link rel="shortcut icon" type="image/png" href="assets/image.png" />
  <link rel="apple-touch-icon" href="assets/image.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="checkin-body">
  <main class="checkin-shell">
    <section class="checkin-card">
      <button type="button" class="language-toggle checkin-language-toggle" data-language-toggle>العربية</button>
      <div class="checkin-head">
        <div class="brand-mark checkin-brand">
          <img src="assets/image.png" alt="EVARA BNS logo" class="brand-logo" />
        </div>
        <div class="checkin-live-meta">
          <div class="checkin-live-chip">
            <span class="meta-label" data-i18n="checkin.today">Today</span>
            <strong id="checkinToday">--</strong>
          </div>
          <div class="checkin-live-chip">
            <span class="meta-label" data-i18n="checkin.currentTime">Current time</span>
            <strong id="checkinClock">--:--</strong>
          </div>
        </div>
      </div>
      <p class="eyebrow" data-i18n="checkin.eyebrow">Quick Attendance</p>
      <h1 data-i18n="checkin.title">Quick mobile attendance.</h1>
      <p class="checkin-copy" data-i18n="checkin.copy">Sign in once, then check in or out instantly.</p>

      <div id="checkinNotice" class="form-alert info hidden"></div>
      <div id="checkinError" class="form-alert error hidden"></div>

      <div id="checkinStatus" class="status-card compact checkin-status-card">
        <div class="checkin-status-main">
          <div class="checkin-status-topline">
            <span id="checkinStatePill" class="status-pill neutral" data-i18n="checkin.loadingButton">Loading</span>
            <span id="checkinIdentity" class="checkin-identity">--</span>
          </div>
          <span class="status-label" data-i18n="checkin.statusLabel">Attendance status</span>
          <strong id="checkinStatusTitle" data-i18n="checkin.loadingTitle">Checking your session</strong>
          <p id="checkinStatusText" data-i18n="checkin.loadingText">Please wait while we load your attendance state.</p>
          <div id="checkinStatusMeta" class="checkin-status-meta hidden"></div>
        </div>
      </div>

      <div class="checkin-actions">
        <button id="checkinActionBtn" type="button" class="btn btn-primary btn-block" data-i18n="checkin.loadingButton" disabled>Loading</button>
        <button id="checkinSecondaryBtn" type="button" class="btn btn-secondary btn-block" data-i18n="common.openDashboard">Open Dashboard</button>
      </div>
    </section>
  </main>

  <script src="vendor/supabase.js"></script>
  <script src="env.js"></script>
  <script type="module" src="js/i18n.js"></script>
  <script type="module" src="js/checkin.js"></script>
</body>
</html>
